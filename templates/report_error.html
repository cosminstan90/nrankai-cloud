<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analysis Unavailable | nrankai.com</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
  <header class="bg-slate-900 border-b border-slate-800">
    <div class="max-w-3xl mx-auto px-6 py-4">
      <span class="text-sm font-semibold tracking-widest text-slate-400 uppercase">nrankai.com</span>
    </div>
  </header>
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="text-center space-y-5 max-w-sm">
      <div class="text-6xl">⚠️</div>
      <h1 class="text-2xl font-bold text-white">Analysis unavailable</h1>
      <p class="text-slate-400 text-sm">
        We were unable to complete the GEO analysis for
        <span class="text-slate-200 font-medium">{{ website }}</span>.
        This sometimes happens with websites that block automated crawlers.
      </p>
      <a href="mailto:hello@nrankai.com?subject=Analysis%20failed%20for%20{{ website }}"
         class="inline-block px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-colors text-sm">
        Let Us Know →
      </a>
    </div>
  </main>

</html>
