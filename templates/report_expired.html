<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Expired | nrankai.com</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">
  <header class="bg-slate-900 border-b border-slate-800">
    <div class="max-w-3xl mx-auto px-6 py-4">
      <span class="text-sm font-semibold tracking-widest text-slate-400 uppercase">nrankai.com</span>
    </div>
  </header>
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="text-center space-y-6 max-w-sm">
      <div class="text-6xl">⏱️</div>
      <h1 class="text-2xl font-bold text-white">This report has expired</h1>
      <p class="text-slate-400 text-sm">
        The GEO analysis for <span class="text-slate-200 font-medium">{{ website }}</span>
        was generated more than 14 days ago and is no longer available.
      </p>
      <p class="text-slate-400 text-sm">
        If you'd like a fresh analysis of your website, get in touch.
      </p>
      <a href="mailto:hello@nrankai.com?subject=Fresh%20GEO%20Report%20Request"
         class="inline-block px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-colors text-sm">
        Request a Fresh Report →
      </a>
    </div>
  </main>
</body>
</html>
