<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsubscribed | nrankai.com</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

  <header class="bg-slate-900 border-b border-slate-800">
    <div class="max-w-3xl mx-auto px-6 py-4">
      <span class="text-sm font-semibold tracking-widest text-slate-400 uppercase">nrankai.com</span>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="text-center space-y-5 max-w-sm">
      <div class="text-5xl">✓</div>
      <h1 class="text-2xl font-bold text-white">You've been unsubscribed</h1>

      <div class="space-y-2">
        <p class="text-slate-300 text-sm">
          You will no longer receive emails from nrankai.com.
        </p>
        {% if email %}
        <p class="text-slate-500 text-xs">
          Removed: <span class="text-slate-400">{{ email }}</span>
        </p>
        {% endif %}
      </div>

      <p class="text-slate-500 text-xs leading-relaxed pt-2">
        If this was a mistake, reply to any of our previous emails<br />
        and we'll add you back right away.
      </p>

      <a href="mailto:hello@nrankai.com"
         class="inline-block px-5 py-2.5 bg-slate-800 hover:bg-slate-700 border border-slate-700
                text-slate-300 hover:text-white font-medium rounded-xl transition-colors text-sm">
        Contact us
      </a>
    </div>
  </main>

  <footer class="py-6 text-center">
    <p class="text-xs text-slate-700">nrankai.com · hello@nrankai.com</p>
  </footer>

</body>
</html>
